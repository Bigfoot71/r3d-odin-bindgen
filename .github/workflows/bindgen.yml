name: Generate Odin Bindings

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout bindgen repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      # === Check for new r3d build =======================================

      - name: Check for new successful build in r3d
        id: check
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/Bigfoot71/r3d/actions/workflows/build.yml/runs?status=success&branch=master&per_page=1")

          LATEST_SHA=$(echo "$RESPONSE" | jq -r '.workflow_runs[0].head_sha')
          LATEST_RUN_ID=$(echo "$RESPONSE" | jq -r '.workflow_runs[0].id')
          LAST_SHA=$(cat .last-r3d-sha 2>/dev/null || echo "")

          echo "latest_sha=$LATEST_SHA" >> $GITHUB_OUTPUT
          echo "latest_run_id=$LATEST_RUN_ID" >> $GITHUB_OUTPUT
          echo "changed=$( [ "$LATEST_SHA" != "$LAST_SHA" ] && echo true || echo false )" >> $GITHUB_OUTPUT

      - name: No new build detected
        if: steps.check.outputs.changed == 'false'
        run: |
          echo "r3d has not changed since last run, skipping."
          exit 0

      # === Toolchain =====================================================

      - name: Setup Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: latest

      - name: Symlink libclang.so
        run: sudo ln -s libclang-18.so.1 /lib/x86_64-linux-gnu/libclang.so
        working-directory: ${{ env.LLVM_PATH }}/lib

      - name: Install odin-c-bindgen
        run: |
          cd odin-c-bindgen/src
          odin build . -o:speed -out:./odin-c-bindgen-bin
          sudo mv ./odin-c-bindgen-bin /usr/local/bin/odin-c-bindgen
          sudo chmod +x /usr/local/bin/odin-c-bindgen

      # === Libraries ====================================================

      - name: Download pre-built libraries from r3d
        id: download_libs
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build.yml
          repo: Bigfoot71/r3d
          run_id: ${{ steps.check.outputs.latest_run_id }}
          path: ./prebuilt-libs/
          skip_unpack: false
        continue-on-error: true

      - name: Prepare pre-built libraries for bindgen script
        if: steps.download_libs.outcome == 'success'
        run: |
          mkdir -p ./libs/linux ./libs/macos ./libs/windows

          copy_lib() {
            local name=$1 platform=$2 dest=$3
            local file=$(find ./prebuilt-libs/ -path "*$platform*" -name "$name" | head -1)
            if [ -n "$file" ]; then
              cp "$file" "$dest/$name"
              echo "Found $platform $name: $file"
            else
              echo "Warning: $platform $name not found"
            fi
          }

          for lib in libr3d.a libassimp.a; do
            copy_lib "$lib" "r3d-ubuntu-latest-Release-clang" "./libs/linux"
            copy_lib "$lib" "r3d-macos-latest-Release-clang" "./libs/macos"
          done

          for lib in r3d.lib assimp-vc143-mt.lib; do
            copy_lib "$lib" "r3d-windows-latest-Release-cl" "./libs/windows"
          done

          ls -lR ./libs/

      # === Generate =====================================================

      - name: Generate bindings (with pre-built libs)
        if: steps.download_libs.outcome == 'success'
        run: |
          chmod +x bindgen.sh
          ./bindgen.sh --prebuilt-libs ./libs
        continue-on-error: true
        id: bindgen_prebuilt

      - name: Generate bindings (build libs from scratch)
        if: steps.download_libs.outcome != 'success' || steps.bindgen_prebuilt.outcome == 'failure'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build mingw-w64 \
            libx11-dev libxcursor-dev libxrandr-dev \
            libxinerama-dev libxi-dev libgl-dev
          chmod +x bindgen.sh
          ./bindgen.sh
        continue-on-error: true
        id: bindgen_scratch

      - name: Upload build logs (on failure)
        if: steps.bindgen_prebuilt.outcome == 'failure' || steps.bindgen_scratch.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ./binding/build_*.log
          retention-days: 7

      - name: Display build logs (on failure)
        if: steps.bindgen_prebuilt.outcome == 'failure' || steps.bindgen_scratch.outcome == 'failure'
        run: |
          for log in ./binding/build_*.log; do
            echo "============================================"
            echo "LOG: $log"
            echo "============================================"
            cat "$log"
          done

      - name: Fail if bindgen failed
        if: steps.bindgen_prebuilt.outcome == 'failure' && steps.bindgen_scratch.outcome == 'failure'
        run: exit 1

      # === Commit =======================================================

      - name: Update r3d submodule
        run: |
          cd r3d
          git fetch origin
          git checkout ${{ steps.check.outputs.latest_sha }}
          cd ..

      - name: Commit and push
        if: steps.bindgen_prebuilt.outcome == 'success' || steps.bindgen_scratch.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "${{ steps.check.outputs.latest_sha }}" > .last-r3d-sha
          git add .last-r3d-sha

          if ! git diff --quiet --cached r3d; then
            git add r3d
          fi

          git commit -m "Update bindings from r3d@${{ steps.check.outputs.latest_sha }}"
          git push

      # === Artifacts ====================================================

      - name: Upload binding artifacts
        uses: actions/upload-artifact@v4
        with:
          name: r3d-odin-bindings
          path: binding/r3d/
          retention-days: 7
          if-no-files-found: error
